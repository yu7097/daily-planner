<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我的计划</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:#f5f6f8;color:#2c3e3a;padding-bottom:60px;
    -webkit-font-smoothing:antialiased
  }
  .header{
    background:#fff;padding:24px 20px 14px;border-bottom:1px solid #e8eaed;
    position:sticky;top:0;z-index:10
  }
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .header h1{font-size:20px;font-weight:600}
  .date-nav{display:flex;align-items:center;gap:10px}
  .date-nav button{
    background:#f5f6f8;border:1px solid #e8eaed;border-radius:6px;
    padding:4px 10px;cursor:pointer;font-size:15px
  }
  .date-nav button:active{opacity:.6}
  .date-nav .label{font-size:14px;color:#7a8f89;min-width:100px;text-align:center}
  .date-nav .today-btn{font-size:12px;padding:4px 10px;background:#5ba88c;color:#fff;border:none;border-radius:5px;cursor:pointer}
  .bar{height:5px;background:#e8eaed;border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;background:#5ba88c;border-radius:3px;transition:width .3s;width:0}
  .stats{display:flex;justify-content:space-between;font-size:12px;color:#7a8f89;margin-top:5px}
  .streak{color:#3d8a6f;font-weight:600}

  .content{max-width:640px;margin:0 auto;padding:12px 12px}
  .block{margin-bottom:16px}
  .block-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 4px}
  .block-hd h2{font-size:15px;font-weight:600}
  .block-hd .count{font-size:12px;color:#7a8f89;background:#f5f6f8;padding:1px 8px;border-radius:8px}
  .task-list{display:flex;flex-direction:column;gap:6px}
  .task{
    background:#fff;border-radius:10px;padding:10px 12px;
    display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)
  }
  .task.done{opacity:.65}
  .task.done .task-txt{text-decoration:line-through;color:#7a8f89}
  .check{
    width:20px;height:20px;border-radius:50%;border:2px solid #d0d8d4;
    cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    transition:all .15s
  }
  .check.on{background:#5ba88c;border-color:#5ba88c}
  .check.on::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
  .task-txt{flex:1;font-size:14px;min-width:0}
  .task .del{
    background:none;border:none;cursor:pointer;font-size:15px;padding:2px 4px;
    opacity:.4;transition:opacity .15s
  }
  .task .del:hover{opacity:1}
  .add-form{display:flex;gap:6px;margin-top:6px}
  .add-form input{
    flex:1;border:1.5px solid #e0e6e2;border-radius:8px;padding:9px 11px;
    font-size:14px;background:#fafbfc;outline:none;transition:border-color .2s
  }
  .add-form input:focus{border-color:#5ba88c}
  .add-form button{
    background:#5ba88c;color:#fff;border:none;border-radius:8px;
    padding:9px 14px;font-size:13px;cursor:pointer;white-space:nowrap
  }
  .add-form button:active{transform:scale(.96)}

  .empty{text-align:center;padding:18px 0;color:#7a8f89;font-size:13px}

  .tabs{
    position:fixed;bottom:0;left:0;right:0;background:#fff;
    border-top:1px solid #e8eaed;display:flex;z-index:10
  }
  .tabs button{
    flex:1;padding:11px 0;border:none;background:none;font-size:13px;
    color:#7a8f89;cursor:pointer
  }
  .tabs button.active{color:#5ba88c;font-weight:600}
  .page{display:none}
  .page.on{display:block}

  /* History */
  .hist-week{
    background:#fff;border-radius:10px;padding:14px;margin-bottom:10px
  }
  .hist-week h3{font-size:14px;margin-bottom:8px}
  .days{display:flex;gap:4px;flex-wrap:wrap}
  .day{
    width:36px;height:44px;border-radius:6px;display:flex;
    flex-direction:column;align-items:center;justify-content:center;
    font-size:10px;background:#f5f6f8;gap:2px
  }
  .day .num{font-weight:600}
  .day .dot{width:5px;height:5px;border-radius:50%}
  .day .dot.f{background:#5ba88c}
  .day .dot.p{background:#d4a853}
  .day .dot.e{background:#e0e6e2}
  .day.t{border:2px solid #5ba88c}

  .cards{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .card{
    flex:1;min-width:80px;background:#fff;border-radius:10px;
    padding:12px;text-align:center
  }
  .card .n{font-size:22px;font-weight:700;color:#3d8a6f}
  .card .l{font-size:11px;color:#7a8f89;margin-top:2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>📋 我的计划</h1>
    <div class="date-nav">
      <button id="pd">‹</button>
      <span class="label" id="dl">今天</span>
      <button id="nd">›</button>
      <button class="today-btn" id="gt">今天</button>
    </div>
  </div>
  <div class="bar"><div class="bar-fill" id="pb"></div></div>
  <div class="stats">
    <span id="pt">0 / 0</span>
    <span class="streak" id="st">🔥 0 天</span>
  </div>
</div>

<div class="page on" id="p-plan">
<div class="content">

<div class="block" id="b-m">
  <div class="block-hd"><h2>🌅 早上</h2><span class="count" id="c-m">0</span></div>
  <div class="task-list" id="t-m"></div>
  <div class="add-form"><input placeholder="比如：去游泳..." id="i-m"><button data-b="m">+ 添加</button></div>
</div>

<div class="block" id="b-lm">
  <div class="block-hd"><h2>🌤️ 上午</h2><span class="count" id="c-lm">0</span></div>
  <div class="task-list" id="t-lm"></div>
  <div class="add-form"><input placeholder="比如：写代码..." id="i-lm"><button data-b="lm">+ 添加</button></div>
</div>

<div class="block" id="b-a">
  <div class="block-hd"><h2>☀️ 下午</h2><span class="count" id="c-a">0</span></div>
  <div class="task-list" id="t-a"></div>
  <div class="add-form"><input placeholder="比如：健身..." id="i-a"><button data-b="a">+ 添加</button></div>
</div>

<div class="block" id="b-e">
  <div class="block-hd"><h2>🌙 晚上</h2><span class="count" id="c-e">0</span></div>
  <div class="task-list" id="t-e"></div>
  <div class="add-form"><input placeholder="比如：看书..." id="i-e"><button data-b="e">+ 添加</button></div>
</div>

</div></div>

<div class="page" id="p-hist">
<div class="content">
  <div class="cards">
    <div class="card"><div class="n" id="s-cs">0</div><div class="l">当前连续</div></div>
    <div class="card"><div class="n" id="s-bs">0</div><div class="l">最长连续</div></div>
    <div class="card"><div class="n" id="s-tt">0</div><div class="l">已完成</div></div>
  </div>
  <div class="hist-week" id="hw"></div>
</div></div>

<div class="tabs">
  <button class="active" data-p="plan">📝 计划</button>
  <button data-p="hist">📊 记录</button>
</div>

<script>
(function(){
  const K='plnr_data',DK='plnr_d';
  let cd=localStorage.getItem(DK)||D();
  const BS=['m','lm','a','e'];
  const BL={m:'🌅 早上',lm:'🌤️ 上午',a:'☀️ 下午',e:'🌙 晚上'};

  function D(){const d=new Date();return d.getFullYear()+'-'+P(d.getMonth()+1)+'-'+P(d.getDate())}
  function P(n){return String(n).padStart(2,'0')}

  function L(){try{return JSON.parse(localStorage.getItem(K))||{}}catch{return{}}}
  function S(d){localStorage.setItem(K,JSON.stringify(d))}

  function LD(ds){
    const a=L();
    if(!a[ds]){a[ds]={};BS.forEach(b=>a[ds][b]=[])}
    return a[ds]
  }
  function SD(ds,bl){const a=L();a[ds]=bl;S(a)}

  function ID(){return Date.now().toString(36)+Math.random().toString(36).slice(2,4)}

  function R(){
    const isT=cd===D();
    document.getElementById('dl').textContent=isT?'今天':FD(cd);
    document.getElementById('gt').style.display=isT?'none':'inline';
    const bl=LD(cd);
    BS.forEach(b=>RB(b,bl[b]||[]));
    UP(bl);US();
  }

  function RB(bn,tasks){
    const el=document.getElementById('t-'+bn),cnt=document.getElementById('c-'+bn);
    if(!tasks.length){
      el.innerHTML='<div class="empty">还没有安排，加一个吧 📝</div>';
      cnt.textContent='0';return
    }
    const d=tasks.filter(t=>t.done).length;
    cnt.textContent=d+'/'+tasks.length;
    el.innerHTML=tasks.map(t=>'<div class="task'+(t.done?' done':'')+
      '"><div class="check'+(t.done?' on':'')+'" data-i="'+t.id+'" data-b="'+bn+'"></div>'+
      '<span class="task-txt">'+E(t.text)+'</span>'+
      '<button class="del" data-i="'+t.id+'" data-b="'+bn+'">✕</button></div>').join('');
    el.querySelectorAll('.check').forEach(el2=>el2.onclick=function(){TK(this.dataset.i,this.dataset.b)});
    el.querySelectorAll('.del').forEach(el2=>el2.onclick=function(){DL(this.dataset.i,this.dataset.b)});
  }

  function UP(bl){
    const all=[];BS.forEach(b=>{(bl[b]||[]).forEach(t=>all.push(t))});
    const t=all.length,d=all.filter(x=>x.done).length,p=t>0?Math.round(d/t*100):0;
    document.getElementById('pb').style.width=p+'%';
    document.getElementById('pt').textContent=d+' / '+t+(t>0?' ('+p+'%)':'');
  }

  function US(){
    document.getElementById('st').textContent='🔥 '+CS()+' 天';
  }

  function CS(){
    const a=L();let s=0,d=new Date(D()+'T00:00:00');
    for(let i=0;i<365;i++){
      const ds=d.getFullYear()+'-'+P(d.getMonth()+1)+'-'+P(d.getDate());
      const bl=a[ds];if(!bl)break;
      const all=[];BS.forEach(b=>{(bl[b]||[]).forEach(t=>all.push(t))});
      if(all.length&&all.every(t=>t.done))s++;else break;
      d.setDate(d.getDate()-1)
    }
    return s
  }

  function BS2(){
    const a=L();let b=0,c=0,p=null;
    Object.keys(a).filter(d=>/^\d{4}-\d{2}-\d{2}$/.test(d)).sort().forEach(ds=>{
      const bl=a[ds];
      const all=[];BS.forEach(b=>{(bl[b]||[]).forEach(t=>all.push(t))});
      if(all.length&&all.every(t=>t.done)){
        if(p){const df=(new Date(ds+'T00:00:00')-new Date(p+'T00:00:00'))/(864e5);c=df===1?c+1:1}
        else c=1;
        b=Math.max(b,c)
      }else c=0;
      p=ds
    });
    return b
  }

  function TT(){
    const a=L();let t=0;
    Object.keys(a).forEach(ds=>{const bl=a[ds];BS.forEach(b=>{(bl[b]||[]).forEach(t2=>{if(t2.done)t++})})});
    return t
  }

  function AT(bn){
    const inp=document.getElementById('i-'+bn),txt=inp.value.trim();
    if(!txt)return;
    const bl=LD(cd);
    if(!bl[bn])bl[bn]=[];
    bl[bn].push({id:ID(),text:txt,done:false});
    SD(cd,bl);inp.value='';R()
  }

  function TK(id,bn){
    const bl=LD(cd);const t=(bl[bn]||[]).find(x=>x.id===id);
    if(t){t.done=!t.done;SD(cd,bl);R()}
  }

  function DL(id,bn){
    const bl=LD(cd);bl[bn]=(bl[bn]||[]).filter(x=>x.id!==id);SD(cd,bl);R()
  }

  function FD(ds){
    const d=new Date(ds+'T00:00:00');
    return (d.getMonth()+1)+'月'+d.getDate()+'日 周'+['日','一','二','三','四','五','六'][d.getDay()]
  }
  function E(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

  document.getElementById('pd').onclick=function(){const d=new Date(cd+'T00:00:00');d.setDate(d.getDate()-1);cd=d.getFullYear()+'-'+P(d.getMonth()+1)+'-'+P(d.getDate());localStorage.setItem(DK,cd);R()};
  document.getElementById('nd').onclick=function(){const d=new Date(cd+'T00:00:00');d.setDate(d.getDate()+1);if(d>new Date())return;cd=d.getFullYear()+'-'+P(d.getMonth()+1)+'-'+P(d.getDate());localStorage.setItem(DK,cd);R()};
  document.getElementById('gt').onclick=function(){cd=D();localStorage.setItem(DK,cd);R()};

  document.querySelectorAll('.add-form button').forEach(b=>b.onclick=function(){AT(this.dataset.b)});
  document.querySelectorAll('.add-form input').forEach(inp=>inp.onkeydown=function(e){
    if(e.key==='Enter'){const bn=this.id.slice(2);AT(bn)}
  });

  document.querySelectorAll('.tabs button').forEach(b=>b.onclick=function(){
    document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
    this.classList.add('active');
    document.getElementById('p-'+this.dataset.p).classList.add('on');
    if(this.dataset.p==='hist')RH()
  });

  function RH(){
    const a=L();
    document.getElementById('s-cs').textContent=CS();
    document.getElementById('s-bs').textContent=BS2();
    document.getElementById('s-tt').textContent=TT();

    const t=new Date();t.setHours(0,0,0,0);
    const h=[];
    for(let i=27;i>=0;i--){
      const d2=new Date(t);d2.setDate(d2.getDate()-i);
      const ds=d2.getFullYear()+'-'+P(d2.getMonth()+1)+'-'+P(d2.getDate());
      const bl=a[ds];const all=[];BS.forEach(b=>{(bl||{})[b]&&(bl[b]||[]).forEach(t2=>all.push(t2))});
      const dn=all.filter(x=>x.done).length,tt=all.length;
      let dc='e';if(tt>0&&dn===tt)dc='f';else if(dn>0)dc='p';
      h.push('<div class="day'+(ds===D()?' t':'')+'"><span class="num">'+d2.getDate()+'</span><span class="dot '+dc+'"></span></div>')
    }
    document.getElementById('hw').innerHTML='<h3>📅 近 28 天</h3><div class="days">'+h.join('')+'</div>';
  }

  R();
})();
</script>
</body>
</html>
